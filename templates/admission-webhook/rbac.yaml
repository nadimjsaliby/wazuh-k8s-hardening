{{- if .Values.admissionWebhook.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "wazuh-k8s-hardening.webhookServiceName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "wazuh-k8s-hardening.webhookLabels" . | nindent 4 }}
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "wazuh-k8s-hardening.webhookServiceName" . }}
  labels:
    {{- include "wazuh-k8s-hardening.webhookLabels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "wazuh-k8s-hardening.webhookServiceName" . }}
  labels:
    {{- include "wazuh-k8s-hardening.webhookLabels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "wazuh-k8s-hardening.webhookServiceName" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "wazuh-k8s-hardening.webhookServiceName" . }}
    namespace: {{ .Release.Namespace }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "wazuh-k8s-hardening.webhookServiceName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "wazuh-k8s-hardening.webhookLabels" . | nindent 4 }}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      {{- include "wazuh-k8s-hardening.webhookSelectorLabels" . | nindent 6 }}
{{- end }}
