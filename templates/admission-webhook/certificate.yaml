{{- if and .Values.admissionWebhook.enabled .Values.admissionWebhook.certManager.enabled }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "wazuh-k8s-hardening.webhookCertName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "wazuh-k8s-hardening.webhookLabels" . | nindent 4 }}
spec:
  secretName: {{ include "wazuh-k8s-hardening.webhookCertName" . }}
  duration: 8760h
  renewBefore: 720h
  isCA: false
  privateKey:
    algorithm: ECDSA
    size: 256
  usages:
    - server auth
    - digital signature
    - key encipherment
  dnsNames:
    - {{ include "wazuh-k8s-hardening.webhookServiceName" . }}
    - {{ include "wazuh-k8s-hardening.webhookServiceName" . }}.{{ .Release.Namespace }}
    - {{ include "wazuh-k8s-hardening.webhookServiceName" . }}.{{ .Release.Namespace }}.svc
    - {{ include "wazuh-k8s-hardening.webhookServiceName" . }}.{{ .Release.Namespace }}.svc.cluster.local
  issuerRef:
    name: {{ .Values.admissionWebhook.certManager.issuerRef.name }}
    kind: {{ .Values.admissionWebhook.certManager.issuerRef.kind }}
{{- end }}
