policy:
  id: "cis_linux_l1"
  file: "cis_linux_l1.yml"
  name: "CIS Distribution Independent Linux Benchmark v2.0.0 - Level 1"
  description: "This policy checks CIS Distribution Independent Linux Benchmark Level 1 controls applicable to Kubernetes node hosts."
  references:
    - https://www.cisecurity.org/benchmark/distribution_independent_linux
    - https://documentation.wazuh.com/current/user-manual/capabilities/sec-config-assessment/

requirements:
  title: "Check Linux OS"
  description: "Requirements for running the CIS Linux Benchmark checks."
  condition: any
  rules:
    - "f:/etc/os-release"
    - "f:/etc/redhat-release"
    - "f:/etc/debian_version"

checks:
  # ==========================================
  # 1 - Initial Setup
  # ==========================================

  # 1.1 Filesystem Configuration
  - id: 30100
    title: "Ensure mounting of cramfs filesystems is disabled"
    description: "The cramfs filesystem type is a compressed read-only Linux filesystem embedded in small footprint systems."
    rationale: "Removing support for unneeded filesystem types reduces the attack surface."
    remediation: "Add 'install cramfs /bin/true' to /etc/modprobe.d/ and run 'rmmod cramfs'."
    compliance:
      - cis: ["1.1.1.1"]
      - cis_csc_v8: ["4.8"]
    condition: all
    rules:
      - "c:modprobe -n -v cramfs -> r:install /bin/true|install /bin/false"
      - "not c:lsmod -> r:cramfs"

  - id: 30101
    title: "Ensure mounting of squashfs filesystems is disabled"
    description: "The squashfs filesystem type is a compressed read-only Linux filesystem."
    rationale: "Removing support for unneeded filesystem types reduces the attack surface."
    remediation: "Add 'install squashfs /bin/true' to /etc/modprobe.d/ and run 'rmmod squashfs'."
    compliance:
      - cis: ["1.1.1.2"]
      - cis_csc_v8: ["4.8"]
    condition: all
    rules:
      - "c:modprobe -n -v squashfs -> r:install /bin/true|install /bin/false"
      - "not c:lsmod -> r:squashfs"

  - id: 30102
    title: "Ensure mounting of udf filesystems is disabled"
    description: "The udf filesystem type is the Universal Disk Format."
    rationale: "Removing support for unneeded filesystem types reduces the attack surface."
    remediation: "Add 'install udf /bin/true' to /etc/modprobe.d/ and run 'rmmod udf'."
    compliance:
      - cis: ["1.1.1.3"]
      - cis_csc_v8: ["4.8"]
    condition: all
    rules:
      - "c:modprobe -n -v udf -> r:install /bin/true|install /bin/false"
      - "not c:lsmod -> r:udf"

  - id: 30103
    title: "Ensure /tmp is configured"
    description: "The /tmp directory should be a separate partition."
    rationale: "Since /tmp is world-writable, placing it on a separate partition limits the risk of filling up root filesystem."
    remediation: "Configure /tmp as a separate partition or tmpfs."
    compliance:
      - cis: ["1.1.2"]
      - cis_csc_v8: ["4.8"]
    condition: all
    rules:
      - "c:mount -> r:/tmp"

  - id: 30104
    title: "Ensure noexec option set on /tmp partition"
    description: "The noexec mount option specifies that the filesystem cannot contain executable binaries."
    rationale: "Prevents execution of binaries from /tmp, reducing the risk of attacks."
    remediation: "Add noexec to /tmp mount options in /etc/fstab."
    compliance:
      - cis: ["1.1.4"]
      - cis_csc_v8: ["4.8"]
    condition: all
    rules:
      - "c:mount -> r:/tmp && r:noexec"

  # 1.3 Filesystem Integrity Checking
  - id: 30130
    title: "Ensure AIDE is installed"
    description: "AIDE takes a snapshot of filesystem state including modification times and permissions."
    rationale: "File integrity checking provides an audit trail and detects unauthorized changes."
    remediation: "Install AIDE using the package manager."
    compliance:
      - cis: ["1.3.1"]
      - cis_csc_v8: ["3.14"]
    condition: any
    rules:
      - "c:dpkg -l aide -> r:ii\\s+aide"
      - "c:rpm -q aide -> r:aide-"

  # ==========================================
  # 3 - Network Configuration
  # ==========================================

  - id: 30300
    title: "Ensure IP forwarding is disabled (unless required for K8s)"
    description: "IP forwarding should only be enabled if the system is a router or a Kubernetes node."
    rationale: "Setting the flag to 0 ensures the system does not route traffic between interfaces unless required."
    remediation: "If not a Kubernetes node, set net.ipv4.ip_forward=0 in /etc/sysctl.conf."
    compliance:
      - cis: ["3.2.1"]
      - cis_csc_v8: ["4.1"]
    condition: all
    rules:
      - "c:sysctl net.ipv4.ip_forward -> r:net.ipv4.ip_forward = 1"

  - id: 30301
    title: "Ensure packet redirect sending is disabled"
    description: "ICMP Redirects are used to send routing information to other hosts."
    rationale: "An attacker could use a compromised host to send invalid ICMP redirects to other router devices."
    remediation: "Set net.ipv4.conf.all.send_redirects=0 and net.ipv4.conf.default.send_redirects=0."
    compliance:
      - cis: ["3.2.2"]
      - cis_csc_v8: ["4.1"]
    condition: all
    rules:
      - "c:sysctl net.ipv4.conf.all.send_redirects -> r:= 0"
      - "c:sysctl net.ipv4.conf.default.send_redirects -> r:= 0"

  - id: 30302
    title: "Ensure source routed packets are not accepted"
    description: "In networking, source routing allows a sender to partially or fully specify the route packets take."
    rationale: "An attacker could redirect traffic for malicious purposes."
    remediation: "Set net.ipv4.conf.all.accept_source_route=0 and net.ipv4.conf.default.accept_source_route=0."
    compliance:
      - cis: ["3.3.1"]
      - cis_csc_v8: ["4.1"]
    condition: all
    rules:
      - "c:sysctl net.ipv4.conf.all.accept_source_route -> r:= 0"
      - "c:sysctl net.ipv4.conf.default.accept_source_route -> r:= 0"

  - id: 30303
    title: "Ensure ICMP redirects are not accepted"
    description: "ICMP redirect messages are packets that convey routing information."
    rationale: "Attackers could use bogus ICMP redirect messages to maliciously alter the system routing tables."
    remediation: "Set net.ipv4.conf.all.accept_redirects=0 and net.ipv4.conf.default.accept_redirects=0."
    compliance:
      - cis: ["3.3.2"]
      - cis_csc_v8: ["4.1"]
    condition: all
    rules:
      - "c:sysctl net.ipv4.conf.all.accept_redirects -> r:= 0"
      - "c:sysctl net.ipv4.conf.default.accept_redirects -> r:= 0"

  # ==========================================
  # 4 - Logging and Auditing
  # ==========================================

  - id: 30400
    title: "Ensure auditd is installed"
    description: "auditd is the userspace component to the Linux Auditing System."
    rationale: "The capturing of system events provides system administrators with evidence of unauthorized activity."
    remediation: "Install auditd using the package manager."
    compliance:
      - cis: ["4.1.1.1"]
      - cis_csc_v8: ["8.2"]
    condition: any
    rules:
      - "c:dpkg -l auditd -> r:ii\\s+auditd"
      - "c:rpm -q audit -> r:audit-"

  - id: 30401
    title: "Ensure auditd service is enabled and running"
    description: "Enable and start the auditd daemon to ensure audit events are captured."
    rationale: "Audit records provide evidence of system activities for investigation and compliance."
    remediation: "Run systemctl enable auditd && systemctl start auditd."
    compliance:
      - cis: ["4.1.1.2"]
      - cis_csc_v8: ["8.2"]
    condition: all
    rules:
      - "c:systemctl is-enabled auditd -> r:enabled"

  - id: 30402
    title: "Ensure rsyslog or syslog-ng is installed"
    description: "A logging service should be installed to capture system events."
    rationale: "Reliable logging is essential to security monitoring, incident response, and forensics."
    remediation: "Install rsyslog or syslog-ng."
    compliance:
      - cis: ["4.2.1.1"]
      - cis_csc_v8: ["8.2"]
    condition: any
    rules:
      - "c:dpkg -l rsyslog -> r:ii\\s+rsyslog"
      - "c:rpm -q rsyslog -> r:rsyslog-"
      - "c:dpkg -l syslog-ng -> r:ii\\s+syslog-ng"
      - "c:rpm -q syslog-ng -> r:syslog-ng-"

  # ==========================================
  # 5 - Access, Authentication, and Authorization
  # ==========================================

  - id: 30500
    title: "Ensure permissions on /etc/passwd are configured"
    description: "The /etc/passwd file contains user account information."
    rationale: "If the /etc/passwd file is writable, user account information can be modified."
    remediation: "Run chmod 644 /etc/passwd."
    compliance:
      - cis: ["5.1.2"]
      - cis_csc_v8: ["3.3"]
    condition: all
    rules:
      - "c:stat -c %a /etc/passwd -> r:^644$"

  - id: 30501
    title: "Ensure permissions on /etc/shadow are configured"
    description: "The /etc/shadow file stores password hashes."
    rationale: "If attackers can read the /etc/shadow file, they can attempt offline password cracking."
    remediation: "Run chmod 640 /etc/shadow or chmod 000 /etc/shadow."
    compliance:
      - cis: ["5.1.3"]
      - cis_csc_v8: ["3.3"]
    condition: all
    rules:
      - "c:stat -c %a /etc/shadow -> r:^640$|^600$|^000$"

  - id: 30502
    title: "Ensure permissions on /etc/group are configured"
    description: "The /etc/group file contains group account information."
    rationale: "If the /etc/group file is writable, group information can be modified."
    remediation: "Run chmod 644 /etc/group."
    compliance:
      - cis: ["5.1.4"]
      - cis_csc_v8: ["3.3"]
    condition: all
    rules:
      - "c:stat -c %a /etc/group -> r:^644$"

  - id: 30503
    title: "Ensure permissions on /etc/gshadow are configured"
    description: "The /etc/gshadow file stores group password hashes."
    rationale: "Protects group passwords from unauthorized access."
    remediation: "Run chmod 640 /etc/gshadow or chmod 000 /etc/gshadow."
    compliance:
      - cis: ["5.1.5"]
      - cis_csc_v8: ["3.3"]
    condition: all
    rules:
      - "c:stat -c %a /etc/gshadow -> r:^640$|^600$|^000$"

  - id: 30510
    title: "Ensure password expiration is 365 days or less"
    description: "The PASS_MAX_DAYS parameter in /etc/login.defs dictates the maximum password age."
    rationale: "Limits the period an attacker can leverage compromised credentials."
    remediation: "Set PASS_MAX_DAYS 365 in /etc/login.defs."
    compliance:
      - cis: ["5.5.1.1"]
      - cis_csc_v8: ["5.2"]
    condition: all
    rules:
      - 'f:/etc/login.defs -> n:PASS_MAX_DAYS\s+(\d+) compare <= 365'

  - id: 30511
    title: "Ensure minimum days between password changes is configured"
    description: "The PASS_MIN_DAYS parameter sets the minimum number of days between password changes."
    rationale: "By restricting the frequency of password changes, an administrator can prevent users from repeatedly changing their password to reuse an old password."
    remediation: "Set PASS_MIN_DAYS 1 in /etc/login.defs."
    compliance:
      - cis: ["5.5.1.2"]
      - cis_csc_v8: ["5.2"]
    condition: all
    rules:
      - 'f:/etc/login.defs -> n:PASS_MIN_DAYS\s+(\d+) compare >= 1'

  - id: 30520
    title: "Ensure SSH root login is disabled"
    description: "The PermitRootLogin parameter disables direct root login over SSH."
    rationale: "Disabling root login forces administrators to use non-privileged accounts and sudo, providing an audit trail."
    remediation: "Set PermitRootLogin no in /etc/ssh/sshd_config."
    compliance:
      - cis: ["5.3.10"]
      - cis_csc_v8: ["5.4"]
    condition: all
    rules:
      - 'f:/etc/ssh/sshd_config -> r:^\s*PermitRootLogin\s+no'

  - id: 30521
    title: "Ensure SSH protocol is set to 2"
    description: "Ensure only SSH Protocol 2 is used."
    rationale: "SSH Protocol 1 has known cryptographic weaknesses."
    remediation: "Set Protocol 2 in /etc/ssh/sshd_config."
    compliance:
      - cis: ["5.3.4"]
      - cis_csc_v8: ["3.10"]
    condition: all
    rules:
      - "not f:/etc/ssh/sshd_config -> r:^\\s*Protocol\\s+1"

  - id: 30522
    title: "Ensure SSH MaxAuthTries is set to 4 or less"
    description: "The MaxAuthTries parameter limits the number of authentication attempts per connection."
    rationale: "Setting the MaxAuthTries parameter limits brute force attacks."
    remediation: "Set MaxAuthTries 4 in /etc/ssh/sshd_config."
    compliance:
      - cis: ["5.3.5"]
      - cis_csc_v8: ["8.5"]
    condition: all
    rules:
      - 'f:/etc/ssh/sshd_config -> n:^\s*MaxAuthTries\s+(\d+) compare <= 4'

  - id: 30523
    title: "Ensure SSH PermitEmptyPasswords is disabled"
    description: "Ensure that SSH does not allow empty passwords."
    rationale: "Allowing login with empty passwords greatly increases the risk of unauthorized access."
    remediation: "Set PermitEmptyPasswords no in /etc/ssh/sshd_config."
    compliance:
      - cis: ["5.3.9"]
      - cis_csc_v8: ["5.2"]
    condition: all
    rules:
      - 'f:/etc/ssh/sshd_config -> r:^\s*PermitEmptyPasswords\s+no'

  # ==========================================
  # 6 - System Maintenance
  # ==========================================

  - id: 30600
    title: "Ensure no world-writable files exist"
    description: "Unix-based systems support file and directory access permissions beyond the traditional owner/group model."
    rationale: "World-writable files are a security risk as any user can modify them."
    remediation: "Remove world-writable permission from the identified files."
    compliance:
      - cis: ["6.1.10"]
      - cis_csc_v8: ["3.3"]
    condition: none
    rules:
      - 'c:find / -xdev -type f -perm -0002 -not -path "/proc/*" -not -path "/sys/*" 2>/dev/null -> r:.'

  - id: 30601
    title: "Ensure no unowned files or directories exist"
    description: "Files that have no owner may indicate a deleted user or misconfiguration."
    rationale: "Unowned files could be a symptom of an intruder or indicate a misconfigured system."
    remediation: "Locate unowned files and assign them to an appropriate user and group."
    compliance:
      - cis: ["6.1.11"]
      - cis_csc_v8: ["3.3"]
    condition: none
    rules:
      - 'c:find / -xdev -nouser -not -path "/proc/*" -not -path "/sys/*" 2>/dev/null -> r:.'

  - id: 30602
    title: "Ensure no ungrouped files or directories exist"
    description: "Files that have no group may indicate a deleted group or misconfiguration."
    rationale: "Ungrouped files are a security risk and may indicate incomplete user removal."
    remediation: "Locate ungrouped files and assign them to an appropriate group."
    compliance:
      - cis: ["6.1.12"]
      - cis_csc_v8: ["3.3"]
    condition: none
    rules:
      - 'c:find / -xdev -nogroup -not -path "/proc/*" -not -path "/sys/*" 2>/dev/null -> r:.'
